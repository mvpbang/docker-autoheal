name: build

on:
  push:
    branches:
      - main
    tags:
      - '*'
  schedule:
    - cron: '0 0 * * *'

jobs:
  multi:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5  # 升级至 v5，原生支持现代 Node.js 运行时

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4  # 升级至 v4

      - name: Set up Docker Buildx
        id: buildx
        uses: docker/setup-buildx-action@v4  # 升级至 v4

      - name: Login to DockerHub
        uses: docker/login-action@v4  # 升级至 v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set Docker Tag
        run: |
          if [ "${{ github.event_name }}" = "schedule" ] || [ "${{ github.ref }}" = "refs/heads/main" ]; then
            echo "tag=mvpbang/docker-autoheal:latest" >> $GITHUB_ENV
          elif [[ "${{ github.ref }}" == refs/tags/* ]]; then
            echo "tag=mvpbang/docker-autoheal:${GITHUB_REF#refs/*/}" >> $GITHUB_ENV
          else
            echo "tag=mvpbang/docker-autoheal:latest" >> $GITHUB_ENV
          fi

      - name: Build and push
        uses: docker/build-push-action@v7  # 升级至 v7，完美适配最新运行环境
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64,linux/arm/v6,linux/arm/v7,linux/arm64/v8,linux/ppc64le,linux/riscv64
          tags: |
            ${{ env.tag }}
